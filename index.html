<!DOCTYPE html>
<html>
<head>
  <title>⚽ Team Manager PRO</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<h2>⚽ Team Manager PRO</h2>

<button onclick="login()">Login Google</button>
<button onclick="createMatch()">Tạo trận</button>

<p id="user"></p>

<h3>📋 Danh sách trận</h3>
<div id="matches"></div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB7q5q9PRzhfRTJO4w2bjOM8p9FGJrdlN4",
  authDomain: "uhihihaha-4dbdf.firebaseapp.com",
  projectId: "uhihihaha-4dbdf",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;

auth.onAuthStateChanged(user => {
  if(user){
    currentUser = user;
    document.getElementById("user").innerText = "Xin chào: " + user.displayName;
    loadMatches();
  }
});

// LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// TẠO TRẬN
function createMatch(){
  if(!currentUser){
    alert("Login trước!");
    return;
  }

  db.collection("matches").add({
    host: currentUser.email,
    created: new Date(),
    players: [],
    teamA: [],
    teamB: [],
    result: null
  }).then(() => {
    alert("Tạo trận thành công!");
  }).catch(err => {
    console.error(err);
    alert("Lỗi tạo trận!");
  });
}

// LOAD TRẬN
function loadMatches(){
  db.collection("matches").onSnapshot(snapshot => {
    let html = "";

    snapshot.forEach(doc => {
      const data = doc.data();

      const players = data.players || [];
      const teamA = data.teamA || [];
      const teamB = data.teamB || [];

      html += `
        <div style="border:1px solid #000; margin:10px; padding:10px;">
          <p><b>Match:</b> ${doc.id}</p>

          <button onclick="joinMatch('${doc.id}')">✅ Đi đá</button>
          <button onclick="leaveMatch('${doc.id}')">❌ Nghỉ</button>

          <p>👥 Người chơi: ${players.length}</p>

          <button onclick="splitTeam('${doc.id}')">⚽ Chia team</button>

          <p>🅰️ Team A: ${teamA.join(", ")}</p>
          <p>🅱️ Team B: ${teamB.join(", ")}</p>

          <button onclick="setResult('${doc.id}', 'A')">A thắng</button>
          <button onclick="setResult('${doc.id}', 'B')">B thắng</button>
          <button onclick="setResult('${doc.id}', 'draw')">Hòa</button>

          <p>🏆 Kết quả: ${data.result || "Chưa có"}</p>

          <div>💰 Tiền:</div>
          ${renderMoney(data)}
        </div>
      `;
    });

    document.getElementById("matches").innerHTML = html;
  });
}

// THAM GIA
function joinMatch(id){
  db.collection("matches").doc(id).update({
    players: firebase.firestore.FieldValue.arrayUnion(currentUser.email)
  });
}

// NGHỈ
function leaveMatch(id){
  db.collection("matches").doc(id).update({
    players: firebase.firestore.FieldValue.arrayRemove(currentUser.email)
  });
}

// CHIA TEAM
function splitTeam(id){
  const ref = db.collection("matches").doc(id);

  ref.get().then(doc => {
    let players = doc.data().players || [];

    players.sort(() => Math.random() - 0.5);

    let mid = Math.ceil(players.length / 2);

    ref.update({
      teamA: players.slice(0, mid),
      teamB: players.slice(mid)
    });
  });
}

// NHẬP KẾT QUẢ
function setResult(id, result){
  db.collection("matches").doc(id).update({
    result: result
  });
}

// TÍNH TIỀN
function renderMoney(data){
  if(!data.result) return "";

  let html = "";

  const teamA = data.teamA || [];
  const teamB = data.teamB || [];

  let win = 30000;
  let lose = 40000;
  let draw = 35000;

  teamA.forEach(p => {
    let money = 0;
    if(data.result === "draw") money = draw;
    else if(data.result === "A") money = win;
    else money = lose;

    html += `<p>${p}: ${money}đ</p>`;
  });

  teamB.forEach(p => {
    let money = 0;
    if(data.result === "draw") money = draw;
    else if(data.result === "B") money = win;
    else money = lose;

    html += `<p>${p}: ${money}đ</p>`;
  });

  return html;
}
</script>

</body>
</html>
