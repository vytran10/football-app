<!DOCTYPE html>
<html>
<head>
  <title>⚽ Uhihihaha Team</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body { margin:0; font-family:Arial; background:#0f172a; color:white }
    header { display:flex; justify-content:space-between; padding:15px; background:#1e293b }
    button { padding:8px 12px; margin:4px; border:none; border-radius:6px; cursor:pointer }
    .blue { background:#3b82f6; color:white }
    .red { background:#ef4444 }
    .green { background:#22c55e }
    .card { background:#1e293b; padding:15px; margin:10px; border-radius:10px }
  </style>
</head>

<body>

<header>
  <div>⚽ Uhihihaha Team</div>
  <div id="authBox">
    <button class="blue" onclick="login()">Login</button>
  </div>
</header>

<div id="app" style="display:none">

  <button class="blue" onclick="createMatch()">➕ Tạo trận</button>

  <div id="matches"></div>

  <div class="card">
    <h3>💰 Công nợ của tôi</h3>
    <div id="debts"></div>
  </div>

</div>

<script>
// 🔥 CONFIG CHUẨN CỦA ANH
const firebaseConfig = {
  apiKey: "AIzaSyB7q5q9PRzhfRTJO4w2bjOM8p9FGJrdlN4",
  authDomain: "uhihihaha-4dbdf.firebaseapp.com",
  projectId: "uhihihaha-4dbdf",
  storageBucket: "uhihihaha-4dbdf.firebasestorage.app",
  messagingSenderId: "255192820788",
  appId: "1:255192820788:web:408e81240f26e351b3ae61",
  measurementId: "G-7HMNNQ2QGW"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let role = "player";

// LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// LOGOUT
function logout(){
  auth.signOut();
}

// CHECK LOGIN
auth.onAuthStateChanged(async user => {

  if(!user){
    document.getElementById("app").style.display = "none";
    document.getElementById("authBox").innerHTML =
      `<button class="blue" onclick="login()">Login</button>`;
    return;
  }

  currentUser = user;

  let ref = db.collection("users").doc(user.email);
  let doc = await ref.get();

  if(!doc.exists){
    role = user.email === "vytrantan1010@gmail.com" ? "admin" : "player";

    await ref.set({
      email: user.email,
      role: role
    });
  } else {
    role = doc.data().role;
  }

  document.getElementById("authBox").innerHTML =
    user.email + " (" + role + ") <button onclick='logout()'>Logout</button>";

  document.getElementById("app").style.display = "block";

  loadMatches();
  loadDebt();
});

// TẠO TRẬN
function createMatch(){
  if(role === "player"){
    alert("Không có quyền");
    return;
  }

  let time = prompt("Nhập ngày giờ (VD: 30/03 18:30)");

  db.collection("matches").add({
    time: time,
    players: [],
    teamA: [],
    teamB: [],
    result: null
  });
}

// LOAD MATCH
function loadMatches(){
  db.collection("matches").onSnapshot(snapshot => {

    let html = "";

    snapshot.forEach(doc => {
      let m = doc.data();
      let players = m.players || [];

      html += `
        <div class="card">
          <p>🕒 ${m.time || ""}</p>
          <p>👥 ${players.length} người</p>

          <button class="green" onclick="join('${doc.id}')">Đi đá</button>
          <button class="red" onclick="leave('${doc.id}')">Nghỉ</button>

          <button onclick="split('${doc.id}')">Chia team</button>

          <button onclick="setResult('${doc.id}','A')">Đỏ thắng</button>
          <button onclick="setResult('${doc.id}','B')">Đen thắng</button>
          <button onclick="setResult('${doc.id}','draw')">Hòa</button>

          <p>KQ: ${m.result || "Chưa có"}</p>
        </div>
      `;
    });

    document.getElementById("matches").innerHTML = html;
  });
}

// JOIN
function join(id){
  db.collection("matches").doc(id).update({
    players: firebase.firestore.FieldValue.arrayUnion(currentUser.email)
  });
}

// LEAVE
function leave(id){
  db.collection("matches").doc(id).update({
    players: firebase.firestore.FieldValue.arrayRemove(currentUser.email)
  });
}

// CHIA TEAM
function split(id){
  db.collection("matches").doc(id).get().then(doc => {
    let p = doc.data().players || [];

    p.sort(() => Math.random() - 0.5);

    let mid = Math.ceil(p.length / 2);

    db.collection("matches").doc(id).update({
      teamA: p.slice(0, mid),
      teamB: p.slice(mid)
    });
  });
}

// KẾT QUẢ + TIỀN
function setResult(id, result){
  db.collection("matches").doc(id).update({ result });

  db.collection("matches").doc(id).get().then(doc => {
    let m = doc.data();
    let teamA = m.teamA || [];
    let teamB = m.teamB || [];

    teamA.forEach(u => saveMoney(id, u, result === "A" ? 30000 : result === "draw" ? 35000 : 40000));
    teamB.forEach(u => saveMoney(id, u, result === "B" ? 30000 : result === "draw" ? 35000 : 40000));
  });
}

// SAVE TIỀN
function saveMoney(matchId, userEmail, amount){
  db.collection("payments").add({
    matchId: matchId,
    user: userEmail,
    amount: amount,
    paid: false
  });
}

// LOAD NỢ
function loadDebt(){
  db.collection("payments")
    .where("user","==",currentUser.email)
    .onSnapshot(snapshot => {

      let total = 0;
      let html = "";

      snapshot.forEach(doc => {
        let p = doc.data();

        if(!p.paid){
          total += p.amount;
          html += p.amount + "đ<br>";
        }
      });

      document.getElementById("debts").innerHTML =
        "<b>Tổng nợ: " + total + "đ</b><br>" + html;
    });
}
</script>

</body>
</html>
