<script>
// 🔥 FIX: chặn in-app browser
const isInApp = /FBAN|FBAV|Zalo|Instagram/i.test(navigator.userAgent);

if (isInApp) {
  document.body.innerHTML = `
    <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;text-align:center;background:#0f172a;color:white">
      <h2>🚫 Không thể đăng nhập</h2>
      <p>Vui lòng mở bằng Chrome hoặc Safari</p>
    </div>
  `;
  throw new Error("Blocked in-app browser");
}

// 🔥 Firebase
const firebaseConfig = {
  apiKey: "AIzaSyB7q5q9PRzhfRTJO4w2bjOM8p9FGJrdlN4",
  authDomain: "uhihihaha-4dbdf.firebaseapp.com",
  projectId: "uhihihaha-4dbdf",
  storageBucket: "uhihihaha-4dbdf.firebasestorage.app",
  messagingSenderId: "255192820788",
  appId: "1:255192820788:web:408e81240f26e351b3ae61",
  measurementId: "G-7HMNNQ2QGW"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let role = "player";

// LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// LOGOUT
function logout(){
  auth.signOut();
}

// AUTH STATE
auth.onAuthStateChanged(async user => {

  if(!user){
    document.getElementById("app").style.display = "none";
    document.getElementById("authBox").innerHTML =
      `<button onclick="login()">Login</button>`;
    return;
  }

  currentUser = user;

  let ref = db.collection("users").doc(user.email);
  let doc = await ref.get();

  if(!doc.exists){
    role = user.email === "vytrantan1010@gmail.com" ? "admin" : "player";
    await ref.set({ email:user.email, role });
  } else {
    role = doc.data().role;
  }

  document.getElementById("authBox").innerHTML =
    user.email + " (" + role + ") <button onclick='logout()'>Logout</button>";

  document.getElementById("app").style.display = "block";

  loadMatches();
  loadDebt();
});

// TẠO TRẬN
function createMatch(){
  if(role === "player"){
    alert("Không có quyền");
    return;
  }

  let time = prompt("Nhập ngày giờ");

  db.collection("matches").add({
    time,
    players: [],
    teamA: [],
    teamB: [],
    result: null
  });
}

// LOAD MATCH
function loadMatches(){
  db.collection("matches").onSnapshot(snapshot => {

    let html = "";

    snapshot.forEach(doc => {
      let m = doc.data();

      html += `
      <div>
        <p>${m.time || ""}</p>

        <button onclick="join('${doc.id}')">Đi</button>
        <button onclick="leave('${doc.id}')">Nghỉ</button>

        <button onclick="split('${doc.id}')">Chia team</button>

        <button onclick="setResult('${doc.id}','A')">Đỏ thắng</button>
        <button onclick="setResult('${doc.id}','B')">Đen thắng</button>
        <button onclick="setResult('${doc.id}','draw')">Hòa</button>

        <p>${m.result || "Chưa có KQ"}</p>
      </div>
      `;
    });

    document.getElementById("matches").innerHTML = html;
  });
}

// JOIN
function join(id){
  db.collection("matches").doc(id).update({
    players: firebase.firestore.FieldValue.arrayUnion(currentUser.email)
  });
}

// LEAVE
function leave(id){
  db.collection("matches").doc(id).update({
    players: firebase.firestore.FieldValue.arrayRemove(currentUser.email)
  });
}

// CHIA TEAM
function split(id){
  db.collection("matches").doc(id).get().then(doc => {

    let p = doc.data().players || [];
    p.sort(() => Math.random() - 0.5);

    let mid = Math.ceil(p.length/2);

    db.collection("matches").doc(id).update({
      teamA: p.slice(0,mid),
      teamB: p.slice(mid)
    });
  });
}

// KẾT QUẢ
function setResult(id, result){

  db.collection("matches").doc(id).update({ result });

  db.collection("matches").doc(id).get().then(doc => {

    let m = doc.data();

    let teamA = m.teamA || [];
    let teamB = m.teamB || [];

    teamA.forEach(u => saveMoney(id, u,
      result==="A"?30000: result==="draw"?35000:40000));

    teamB.forEach(u => saveMoney(id, u,
      result==="B"?30000: result==="draw"?35000:40000));
  });
}

// SAVE MONEY
function saveMoney(matchId, userEmail, amount){
  db.collection("payments").add({
    matchId,
    user:userEmail,
    amount,
    paid:false
  });
}

// LOAD NỢ
function loadDebt(){
  db.collection("payments")
  .where("user","==",currentUser.email)
  .onSnapshot(snapshot => {

    let total = 0;

    snapshot.forEach(doc => {
      let p = doc.data();
      if(!p.paid) total += p.amount;
    });

    document.getElementById("debts").innerHTML =
      "Tổng nợ: " + total + "đ";
  });
}
</script>
