<!DOCTYPE html>
<html>
<head>
  <title>⚽ Team Manager</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body>

<h2>⚽ Team Manager</h2>

<button onclick="login()">Login Google</button>
<button onclick="createMatch()">Tạo trận</button>

<p id="user"></p>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB7q5q9PRzhfRTJO4w2bjOM8p9FGJrdlN4",
  authDomain: "uhihihaha-4dbdf.firebaseapp.com",
  projectId: "uhihihaha-4dbdf",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user => {
  if(user){
    document.getElementById("user").innerText = "Xin chào: " + user.displayName;
  }
});

function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

function createMatch(){
  const user = auth.currentUser;
  if(!user){
    alert("Login trước!");
    return;
  }

  db.collection("matches").add({
    host: user.email,
    created: new Date(),
  });

  alert("Đã tạo trận!");
}
</script>

</body>
</html>
