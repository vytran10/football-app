<!DOCTYPE html>
<html>
<head>
  <title>⚽ Uhihihaha Team</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      font-family: Arial;
      margin:0;
      background:#0f172a;
      color:white;
    }

    header {
      padding:15px;
      background:#1e293b;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .tabs {
      display:flex;
      background:#111827;
    }

    .tab {
      padding:12px;
      cursor:pointer;
      flex:1;
      text-align:center;
    }

    .active {
      background:#2563eb;
    }

    .container {
      padding:15px;
    }

    .card {
      background:#1e293b;
      padding:15px;
      margin-bottom:10px;
      border-radius:12px;
    }

    button {
      margin:4px;
      padding:6px 10px;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    .btn-blue { background:#3b82f6; color:white }
    .btn-red { background:#ef4444 }
    .btn-green { background:#22c55e }

  </style>
</head>

<body>

<header>
  <div>⚽ Uhihihaha Team</div>
  <div>
    <span id="user"></span> | <span id="role"></span>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('match')">⚽ Trận</div>
  <div class="tab" onclick="switchTab('profile')">👤 Hồ sơ</div>
  <div class="tab" onclick="switchTab('fund')">💰 Quỹ</div>
</div>

<div class="container">

  <div id="matchTab">
    <button class="btn-blue" onclick="createMatch()">➕ Tạo trận</button>
    <div id="matches"></div>
  </div>

  <div id="profileTab" style="display:none">
    <div class="card">
      <h3>👤 Hồ sơ</h3>
      <p id="profileInfo"></p>
    </div>
  </div>

  <div id="fundTab" style="display:none">
    <div class="card">
      <h3>💰 Quỹ đội</h3>
      <p>Đang phát triển...</p>
    </div>
  </div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB7q5q9PRzhfRTJO4w2bjOM8p9FGJrdlN4",
  authDomain: "uhihihaha-4dbdf.firebaseapp.com",
  projectId: "uhihihaha-4dbdf",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentRole = "player";

function switchTab(tab){
  document.getElementById("matchTab").style.display="none";
  document.getElementById("profileTab").style.display="none";
  document.getElementById("fundTab").style.display="none";

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  if(tab==="match"){
    document.getElementById("matchTab").style.display="block";
    document.querySelectorAll(".tab")[0].classList.add("active");
  }
  if(tab==="profile"){
    document.getElementById("profileTab").style.display="block";
    document.querySelectorAll(".tab")[1].classList.add("active");
  }
  if(tab==="fund"){
    document.getElementById("fundTab").style.display="block";
    document.querySelectorAll(".tab")[2].classList.add("active");
  }
}

// LOGIN
auth.onAuthStateChanged(async user => {
  if(user){
    currentUser = user;

    document.getElementById("user").innerText = user.email;

    const ref = db.collection("users").doc(user.email);
    const doc = await ref.get();

    if(!doc.exists){
      let role = user.email === "vytrantan1010@gmail.com" ? "admin" : "player";

      await ref.set({
        email:user.email,
        name:user.displayName,
        role:role,
        totalMoney:0,
        totalMatches:0
      });

      currentRole = role;
    } else {
      currentRole = doc.data().role;
    }

    document.getElementById("role").innerText = currentRole;

    loadMatches();
    loadProfile();
  } else {
    auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
  }
});

// CREATE MATCH
function createMatch(){
  if(currentRole==="player"){
    alert("Không có quyền");
    return;
  }

  db.collection("matches").add({
    createdBy: currentUser.email,
    createdAt: new Date(),
    status:"open",
    players:[],
    result:null
  });
}

// LOAD MATCH
function loadMatches(){
  db.collection("matches").onSnapshot(snap=>{
    let html="";

    snap.forEach(doc=>{
      const d=doc.data();
      const players=d.players||[];

      html+=`
        <div class="card">
          <p>👥 ${players.length} người</p>

          <button class="btn-green" onclick="join('${doc.id}')">Đi đá</button>
          <button class="btn-red" onclick="leave('${doc.id}')">Nghỉ</button>

          ${currentRole!=="player"?`
            <button onclick="result('${doc.id}','A')">Đỏ thắng</button>
            <button onclick="result('${doc.id}','B')">Đen thắng</button>
            <button onclick="result('${doc.id}','draw')">Hòa</button>
          `:""}

          <p>KQ: ${d.result||"Chưa có"}</p>
        </div>
      `;
    });

    document.getElementById("matches").innerHTML=html;
  });
}

function join(id){
  db.collection("matches").doc(id).update({
    players: firebase.firestore.FieldValue.arrayUnion(currentUser.email)
  });
}

function leave(id){
  db.collection("matches").doc(id).update({
    players: firebase.firestore.FieldValue.arrayRemove(currentUser.email)
  });
}

function result(id,res){
  db.collection("matches").doc(id).update({result:res});
}

function loadProfile(){
  db.collection("users").doc(currentUser.email).get().then(doc=>{
    const d=doc.data();
    document.getElementById("profileInfo").innerText=
      "Tên: "+d.name+"\nRole: "+d.role+"\nTổng trận: "+d.totalMatches;
  });
}
</script>

</body>
</html>
