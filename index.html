<!DOCTYPE html>
<html>
<head>
  <title>⚽ Uhihihaha Team Manager</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <style>
    body { font-family: Arial; padding:20px; background:#111; color:#fff }
    button { margin:5px; padding:8px; border:none; border-radius:6px }
    .card { background:#222; padding:15px; margin:10px 0; border-radius:10px }
  </style>
</head>

<body>

<h2>⚽ Uhihihaha Team Manager</h2>

<button onclick="login()">Login Google</button>
<p id="user"></p>
<p id="role"></p>

<div id="main" style="display:none">

  <button onclick="createMatch()">➕ Tạo trận (Host)</button>

  <h3>📋 Trận đấu</h3>
  <div id="matches"></div>

</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyB7q5q9PRzhfRTJO4w2bjOM8p9FGJrdlN4",
  authDomain: "uhihihaha-4dbdf.firebaseapp.com",
  projectId: "uhihihaha-4dbdf",
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentRole = "player";

// LOGIN
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

// CHECK USER
auth.onAuthStateChanged(async user => {
  if(user){
    currentUser = user;

    document.getElementById("user").innerText = user.email;

    const ref = db.collection("users").doc(user.email);
    const doc = await ref.get();

    if(!doc.exists){
      // tạo user mới
      let role = "player";

      if(user.email === "vytrantan1010@gmail.com"){
        role = "admin";
      }

      await ref.set({
        email: user.email,
        name: user.displayName,
        role: role,
        totalMoney: 0,
        totalMatches: 0
      });

      currentRole = role;
    } else {
      currentRole = doc.data().role;
    }

    document.getElementById("role").innerText = "Role: " + currentRole;

    document.getElementById("main").style.display = "block";

    loadMatches();
  }
});

// TẠO TRẬN
function createMatch(){
  if(currentRole === "player"){
    alert("Bạn không có quyền");
    return;
  }

  db.collection("matches").add({
    createdBy: currentUser.email,
    createdAt: new Date(),
    status: "open",
    players: [],
    teamA: [],
    teamB: [],
    result: null
  });
}

// LOAD MATCH
function loadMatches(){
  db.collection("matches").onSnapshot(snapshot => {
    let html = "";

    snapshot.forEach(doc => {
      const data = doc.data();
      const players = data.players || [];

      html += `
        <div class="card">
          <p>ID: ${doc.id}</p>

          <p>👥 ${players.length} người</p>

          <button onclick="join('${doc.id}')">Đi đá</button>
          <button onclick="leave('${doc.id}')">Nghỉ</button>

          ${currentRole !== "player" ? `
            <button onclick="split('${doc.id}')">Chia team</button>
            <button onclick="result('${doc.id}','A')">Đỏ thắng</button>
            <button onclick="result('${doc.id}','B')">Đen thắng</button>
            <button onclick="result('${doc.id}','draw')">Hòa</button>
          ` : ""}

          <p>KQ: ${data.result || "Chưa có"}</p>
        </div>
      `;
    });

    document.getElementById("matches").innerHTML = html;
  });
}

// JOIN
function join(id){
  db.collection("matches").doc(id).update({
    players: firebase.firestore.FieldValue.arrayUnion(currentUser.email)
  });
}

// LEAVE
function leave(id){
  db.collection("matches").doc(id).update({
    players: firebase.firestore.FieldValue.arrayRemove(currentUser.email)
  });
}

// CHIA TEAM
function split(id){
  db.collection("matches").doc(id).get().then(doc => {
    let p = doc.data().players || [];
    p.sort(()=>Math.random()-0.5);

    let mid = Math.ceil(p.length/2);

    db.collection("matches").doc(id).update({
      teamA: p.slice(0,mid),
      teamB: p.slice(mid)
    });
  });
}

// KẾT QUẢ
function result(id,res){
  db.collection("matches").doc(id).update({
    result: res
  });
}
</script>

</body>
</html>
